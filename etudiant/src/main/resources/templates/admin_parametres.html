<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paramètres - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body { 
            background: #f8fafc;
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: #0f172a;
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar h2 {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 40px;
            color: #38bdf8;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 12px;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 5px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
        }

        .logout-section {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .logout-btn {
            width: 100%;
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 40px;
        }

        header {
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #38bdf8;
            background: white;
        }

        .btn-primary {
            background: #0f172a;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .btn-primary:hover {
            background: #1e293b;
        }

        .alert-success {
            background: #dcfce7;
            color: #15803d;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>💎 Admin Panel</h2>
        <a th:href="@{/admin/dashboard}" class="nav-item">👤 Étudiants</a>
        <a th:href="@{/admin/parametres}" class="nav-item active">⚙️ Paramètres</a>

        <div class="logout-section">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Se déconnecter</button>
            </form>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <h1>Paramètres du Compte</h1>
        </header>

        <div th:if="${success}" class="alert-success" th:text="${success}"></div>

        <div class="card">
            <form th:action="@{/admin/parametres/update}" method="post">
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" name="nom" th:value="${admin.nom}" required>
                </div>
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" name="prenom" th:value="${admin.prenom}" required>
                </div>
                <div class="form-group">
                    <label>Email (Non modifiable)</label>
                    <input type="email" th:value="${admin.email}" readonly style="background: #f1f5f9; color: #94a3b8; cursor: not-allowed;">
                </div>
                <hr style="margin: 30px 0; border: none; border-top: 1px solid #e2e8f0;">
                <div class="form-group">
                    <label>Nouveau Mot de Passe (Laisser vide pour ne pas changer)</label>
                    <input type="password" name="newPassword" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Enregistrer les modifications</button>
            </form>
        </div>
    </main>
</body>
</html>
